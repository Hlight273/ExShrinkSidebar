name: Build and Release WPF App

on:
  push:
    tags:
      - "v*" 
  workflow_dispatch:
    inputs:
      tag:
        description: '手动指定发布的版本号 (例如 v1.0.2)'
        required: true
        default: 'v1.0.2'

jobs:
  publish:
    runs-on: windows-latest
    
    # 添加写入权限，解决 403 错误
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # 设置 .NET SDK
      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # 设置 MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 还原依赖
      - name: Restore dependencies
        run: dotnet restore ExShrinkSidebar.sln

      # 使用 MSBuild 发布
      - name: Publish single-file EXE
        run: |
          msbuild ExShrinkSidebar.sln `
            /p:Configuration=Release `
            /p:RuntimeIdentifier=win-x64 `
            /p:SelfContained=true `
            /p:PublishSingleFile=true `
            /p:PublishTrimmed=false `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:IncludeAllContentForSelfExtract=true `
            /t:Publish

      - name: Zip published output
        run: |
          $publishDir = Join-Path $(Get-Location) "bin/Release/net8.0-windows/win-x64/publish"
          $zipPath = Join-Path $(Get-Location) "artifacts/ExShrinkSidebar-Windows.zip"
          if (-Not (Test-Path (Split-Path $zipPath))) {
            New-Item -ItemType Directory -Path (Split-Path $zipPath) | Out-Null
          }
          if (Test-Path $zipPath) {
            Remove-Item $zipPath
          }
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExShrinkSidebar-Windows
          path: artifacts/ExShrinkSidebar-Windows.zip

      - name: Release to GitHub
        uses: softprops/action-gh-release@v1
        # 当是标签触发 或 手动触发时执行
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 手动触发时使用输入的版本号，标签触发时使用标签名
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: artifacts/ExShrinkSidebar-Windows.zip
          draft: false
          prerelease: false
