name: Build and Release WPF App

on:
  push:
    tags:
      - "v*" #当推送 v 开头的标签时触发(如 v1.0.0)
  workflow_dispatch: #手动触发按钮

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore ExShrinkSidebar.sln

      - name: Publish single-file EXE
        run: |
          dotnet publish ExShrinkSidebar.sln `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:PublishTrimmed=false `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:IncludeAllContentForSelfExtract=true

      - name: Zip published output
        run: |
          $publishDir = Join-Path $(Get-Location) "bin/Release/net8.0-windows/win-x64/publish"
          $zipPath = Join-Path $(Get-Location) "artifacts/ExShrinkSidebar-Windows.zip"
          if (-Not (Test-Path (Split-Path $zipPath))) {
            New-Item -ItemType Directory -Path (Split-Path $zipPath) | Out-Null
          }
          if (Test-Path $zipPath) {
            Remove-Item $zipPath
          }
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath -Force

      #artifact 方便调试查看日志
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExShrinkSidebar-Windows
          path: artifacts/ExShrinkSidebar-Windows.zip

      #发布到 Releases
      - name: Release to GitHub
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') #只有打标签时才发布
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} #无需手动配置，自动提供
        with:
          files: artifacts/ExShrinkSidebar-Windows.zip
          draft: false
          prerelease: false
